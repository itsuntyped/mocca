# Build the Windows apps and publish a GitHub Release.
#
# Triggered by pushing a version tag (e.g. v0.0.1) - use scripts/bump_version.py
# to bump the VERSION file and create/push the tag. Can also be run manually
# (workflow_dispatch) to produce build artifacts without releasing.
#
# Both the CPU and CUDA variants build on a plain windows-latest runner: building
# only bundles DLLs, so no GPU is needed (the CUDA app needs a GPU to *run*, not
# to build).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}  # Manual run: builds artifacts, does not publish a release.

permissions:
  contents: write  # Needed for the release job to create the GitHub Release.

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, cuda, vulkan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (${{ matrix.variant }})
        run: python scripts/setup.py --${{ matrix.variant }}

      - name: Install build tools
        run: python -m pip install pyinstaller pystray pillow

      - name: Build with PyInstaller
        env:
          MOCCA_BUILD_VARIANT: ${{ matrix.variant }}
        run: >
          python -m PyInstaller --noconfirm --clean
          --distpath packaging/windows/dist
          --workpath packaging/windows/build
          packaging/windows/mocca.spec

      - name: Package zip
        id: package
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $dir = switch ('${{ matrix.variant }}') { 'cuda' { 'Mocca-CUDA' } 'vulkan' { 'Mocca-Vulkan' } default { 'Mocca' } }
          $zip = "Mocca-$version-windows-${{ matrix.variant }}.zip"
          Compress-Archive -Path "packaging/windows/dist/$dir/*" -DestinationPath $zip -Force
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mocca-${{ matrix.variant }}
          path: ${{ steps.package.outputs.zip }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
